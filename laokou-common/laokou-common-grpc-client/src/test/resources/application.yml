server:
  port: 8979
spring:
  application:
    name: laokou-common-grpc
  grpc:
    server:
      servlet:
        enabled: false
      port: 9097
      enabled: true
    client:
      channel:
        laokou-common-grpc:
          target: discovery://laokou-common-grpc
          keepalive:
            time: 10s
            timeout: 30s
          idle:
            timeout: 30s
