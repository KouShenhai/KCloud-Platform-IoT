<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>安全登录 · KCloud Platform</title>
  <!-- Ant Design 5 CSS -->
  <link rel="stylesheet" href="https://unpkg.com/antd@5.24.1/dist/reset.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景光晕 */
    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(102,126,234,0.25) 0%, transparent 70%);
      top: -150px; right: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(118,75,162,0.2) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 440px;
      padding: 48px 48px 36px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* 头部 */
    .header { text-align: center; margin-bottom: 40px; }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px; height: 68px;
      border-radius: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin-bottom: 18px;
      box-shadow: 0 8px 28px rgba(102,126,234,0.45);
    }
    .logo-wrap svg { width: 36px; height: 36px; fill: #fff; }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); }

    /* 错误提示 */
    .alert {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: rgba(255,77,79,0.12);
      border: 1px solid rgba(255,120,117,0.35);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 20px;
      color: #ff9c9a;
      font-size: 13.5px;
      line-height: 1.5;
    }
    .alert.show { display: flex; }
    .alert svg { flex-shrink: 0; width: 16px; height: 16px; margin-top: 1px; fill: #ff9c9a; }

    /* 表单字段 */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: rgba(102,126,234,0.7);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.18);
    }
    .input-wrap svg {
      width: 16px; height: 16px;
      fill: rgba(255,255,255,0.3);
      margin-left: 14px;
      flex-shrink: 0;
    }
    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
    }
    .input-wrap input::placeholder { color: rgba(255,255,255,0.25); }

    /* 密码切换 */
    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 14px;
      display: flex;
      align-items: center;
    }
    .eye-btn svg { width: 17px; height: 17px; fill: rgba(255,255,255,0.28); }

    /* 提交按钮 */
    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(102,126,234,0.42);
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.5px;
    }
    .submit-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* 加载动画 */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 底部文字 */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      line-height: 1.6;
    }

    /* 字段验证错误 */
    .field-err {
      font-size: 12px;
      color: #ff9c9a;
      margin-top: 5px;
      display: none;
    }
    .field-err.show { display: block; }
    .input-wrap.invalid { border-color: rgba(255,77,79,0.6); }
  </style>
</head>
<body>
  <div class="card">
    <!-- 头部 -->
    <div class="header">
      <div class="logo-wrap">
        <!-- Shield Icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l6 2.68V11c0 3.73-2.52 7.2-6 8.34C8.52 18.2 6 14.73 6 11V7.68l6-2.68z"/>
        </svg>
      </div>
      <div class="title">KCloud Platform</div>
      <div class="subtitle">OAuth2 安全授权 · 多租户 IoT 平台</div>
    </div>

    <!-- 错误提示 -->
    <div class="alert" id="alert">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="alertMsg">用户名、密码或租户编码错误，请重新填写</span>
    </div>

    <!-- 登录表单 -->
    <!--
      action="/api/login" — Spring Security form login 端点（context-path: /api）
      method="POST"      — Spring Security 要求 POST
      原生表单提交可完整保留 session cookie，确保认证成功后的 SavedRequest 重定向正常工作
    -->
    <form id="loginForm" action="/api/login" method="POST" novalidate>
      <!-- 租户编码 -->
      <div class="field">
        <label for="tenant_code">租户编码</label>
        <div class="input-wrap" id="wrap_tenant_code">
          <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <input type="text" id="tenant_code" name="tenant_code" placeholder="请输入租户编码，如：laokouyun" value="laokouyun" autocomplete="organization" />
        </div>
        <div class="field-err" id="err_tenant_code">请输入租户编码</div>
      </div>

      <!-- 用户名 -->
      <div class="field">
        <label for="username">用户名</label>
        <div class="input-wrap" id="wrap_username">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" />
        </div>
        <div class="field-err" id="err_username">请输入用户名</div>
      </div>

      <!-- 密码 -->
      <div class="field">
        <label for="password">密码</label>
        <div class="input-wrap" id="wrap_password">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" />
          <button type="button" class="eye-btn" id="eyeBtn" onclick="togglePwd()" title="显示/隐藏密码">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <div class="field-err" id="err_password">请输入密码</div>
      </div>

      <!-- 提交 -->
      <button type="submit" class="submit-btn" id="submitBtn">
        <div class="spinner" id="spinner"></div>
        <span id="submitText">安全授权登录</span>
      </button>
    </form>

    <div class="footer">
      此页面用于 OAuth2 授权码安全授权<br/>
      登录成功后将自动跳转回您的应用
    </div>
  </div>

  <script>
    // 检测 Spring Security 登录失败标志（?error 参数）
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.has('error')) {
        showAlert('用户名、密码或租户编码错误，请重新填写');
      }
    })();

    function showAlert(msg) {
      var el = document.getElementById('alert');
      document.getElementById('alertMsg').textContent = msg;
      el.classList.add('show');
    }

    function hideAlert() {
      document.getElementById('alert').classList.remove('show');
    }

    // 密码显示切换
    function togglePwd() {
      var inp = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
      }
    }

    // 表单验证
    function validate() {
      var ok = true;
      ['tenant_code', 'username', 'password'].forEach(function (name) {
        var val = document.getElementById(name).value.trim();
        var err = document.getElementById('err_' + name);
        var wrap = document.getElementById('wrap_' + name);
        if (!val) {
          err.classList.add('show');
          wrap.classList.add('invalid');
          ok = false;
        } else {
          err.classList.remove('show');
          wrap.classList.remove('invalid');
        }
      });
      return ok;
    }

    // 提交
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      hideAlert();
      if (!validate()) {
        e.preventDefault();
        return;
      }
      // 表单验证通过，显示加载状态，允许原生提交
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('submitText').textContent = '正在登录...';
      // 原生 form submit → POST /api/login → Spring Security 处理
      // 认证成功后 Spring Security 自动重定向到 SavedRequest（/api/oauth2/authorize?...）
    });

    // 输入时清除错误状态
    ['tenant_code', 'username', 'password'].forEach(function (name) {
      document.getElementById(name).addEventListener('input', function () {
        document.getElementById('err_' + name).classList.remove('show');
        document.getElementById('wrap_' + name).classList.remove('invalid');
      });
    });
  </script>
</body>
</html>
