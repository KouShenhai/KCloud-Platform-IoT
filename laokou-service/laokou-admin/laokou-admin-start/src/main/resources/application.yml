jasypt:
  encryptor:
    password: ${SECRET_KEY:laokou}
server:
  port: ${SERVER_PORT:9990}
  compression:
    enabled: true
  ssl:
    # 开启证书
    enabled: false
    # 证书位置
    key-store: classpath:scg-keystore.p12
    # 证书别名
    key-alias: ${spring.application.name}
    # 秘钥类型
    key-store-type: PKCS12
    # 证书密码
    key-store-password: laokou
  http2:
    enabled: false
  forward-headers-strategy: framework
  shutdown: graceful
  servlet:
    context-path: /api
  tomcat:
    threads:
      # 工作线程池的最大线程数
      max: 500
      # 工作线程池的最小备用线程数
      min-spare: 50
    # 最大连接数
    max-connections: 10000
    # 当所有工作线程都在忙时，允许等待处理的最大连接数
    accept-count: 200
    # URI编码
    uri-encoding: UTF-8
    # 连接超时时间
    connection-timeout: 60s
spring:
  application:
    name: ${SERVICE_ID:laokou-admin}
  profiles:
    active: @PROFILE-ACTIVE@
  lifecycle:
    timeout-per-shutdown-phase: 2m
  servlet:
    multipart:
      enabled: true
      max-file-size: -1
      max-request-size: -1
  # 开启虚拟线程
  threads:
    virtual:
      enabled: true
  id-generator:
    segment:
      node-id: ${NODE_ID:1}
      configs:
        user:
          key: id-generator:segment:${spring.application.name}:user
          cursor-key: id-generator:segment:cursor:${spring.application.name}:user:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
        menu:
          key: id-generator:segment:${spring.application.name}:menu
          cursor-key: id-generator:segment:cursor:${spring.application.name}:menu:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
        role:
          key: id-generator:segment:${spring.application.name}:role
          cursor-key: id-generator:segment:cursor:${spring.application.name}:role:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
        dept:
          key: id-generator:segment:${spring.application.name}:dept
          cursor-key: id-generator:segment:cursor:${spring.application.name}:dept:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
        operate_log:
          key: id-generator:segment:${spring.application.name}:operate-log
          cursor-key: id-generator:segment:cursor:${spring.application.name}:operate-log:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
        i18n_menu:
          key: id-generator:segment:${spring.application.name}:i18n-menu
          cursor-key: id-generator:segment:cursor:${spring.application.name}:i18n-menu:${spring.id-generator.segment.node-id}
          step: 10000
          load-factor: 0.8
  security:
    oauth2:
      resource-server:
        enabled: true
        request-matcher:
          ignore-patterns:
            GET:
              - /v3/api-docs/**=laokou-admin
              - /actuator/**=laokou-admin
              - /scalar/**=laokou-admin
              - /favicon.svg=laokou-admin
  cloud:
    loadbalancer:
      nacos:
        enabled: true
    inetutils:
      ignored-interfaces:
        - docker0
        - veth.*
    # Sentinel配置
    sentinel:
      filter:
        enabled: true
      web-context-unify: false
      eager: true #开启饥饿加载，直接初始化
      transport:
        dashboard: sentinel:8972
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  cache:
    configs:
      users:
        ttl: 5m
      user_menu:
        ttl: 5m
      sources:
        ttl: 5m
      tenants:
        ttl: 5m
      packages:
        ttl: 5m
      messages:
        ttl: 5m
      menus:
        ttl: 5m
      dicts:
        ttl: 5m
      depts:
        ttl: 5m
      oss:
        ttl: 5m

logging:
  config: classpath:log4j2-@PROFILE-ACTIVE@.xml

scalar:
  enabled: true
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: true
    path: /v3/api-docs
    version: openapi_3_1

# mybatis-plus
mybatis-plus:
  # 全局处理
  global-config:
    db-config:
      column-format: "\"%s\""
  tenant:
    enabled: true
    ignore-tables:
      - sys_tenant
      - sys_source
      - sys_menu
      - sys_package_menu
      - sys_package
      - sys_user
  sql-monitor:
    enabled: true
    interval: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  tracing:
    export:
      enabled: true
    propagation:
      type: w3c
    # 采样率 => 100%
    sampling:
      probability: 1
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://otel-collector:4317/v1/traces
          compression: gzip
          timeout: 5s
          transport: grpc
  metrics:
    tags:
      application: ${spring.application.name}
