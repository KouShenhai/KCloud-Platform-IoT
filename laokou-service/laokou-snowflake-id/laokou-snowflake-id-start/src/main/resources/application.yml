spring:
  application:
    name: ${SERVICE_ID:laokou-snowflake-id}
  profiles:
    active: @PROFILE-ACTIVE@
  lifecycle:
    timeout-per-shutdown-phase: "2m"
  # 开启虚拟线程
  threads:
    virtual:
      enabled: true
  cloud:
    inetutils:
      ignored-interfaces:
        - docker0
        - veth.*
  grpc:
    server:
      servlet:
        enabled: false
      port: ${GRPC_PORT:19094}

logging:
  config: classpath:log4j2-@PROFILE-ACTIVE@.xml
