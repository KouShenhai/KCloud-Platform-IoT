jasypt:
  encryptor:
    password: ${SECRET_KEY:laokou}
server:
  port: ${SERVER_PORT:9094}
  ssl:
    # 开启证书
    enabled: false
    # 证书位置
    key-store: classpath:scg-keystore.p12
    # 证书别名
    key-alias: ${spring.application.name}
    # 秘钥类型
    key-store-type: PKCS12
    # 证书密码
    key-store-password: laokou
  http2:
    enabled: false
  forward-headers-strategy: native
  shutdown: graceful
  servlet:
    context-path: /api
  tomcat:
    threads:
      # 工作线程池的最大线程数
      max: 500
      # 工作线程池的最小备用线程数
      min-spare: 50
    # 最大连接数
    max-connections: 10000
    # 当所有工作线程都在忙时，允许等待处理的最大连接数
    accept-count: 200
    # URI编码
    uri-encoding: UTF-8
    # 连接超时时间
    connection-timeout: 60s
spring:
  application:
    name: ${SERVICE_ID:laokou-distributed-id}
  profiles:
    active: @PROFILE-ACTIVE@
  lifecycle:
    timeout-per-shutdown-phase: "2m"
  # 开启虚拟线程
  threads:
    virtual:
      enabled: true
  cloud:
    inetutils:
      ignored-interfaces:
        - docker0
        - veth.*
  id-generator:
    redis-segment:
      # 是否启用 Redis 分段 ID 生成器（需同时配置 Redis 连接信息）
      enabled: true
      # 每次从 Redis 获取的号段步长
      step: 1000
      # Redis Key
      key: "distributed:id:segment"
      # 异步加载因子（号段使用达到此比例时预加载下一个号段）
      load-factor: 0.5
    snowflake:
      enabled: true
  grpc:
    server:
      servlet:
        enabled: false
      port: ${GRPC_PORT:10111}

logging:
  config: classpath:log4j2-@PROFILE-ACTIVE@.xml

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  tracing:
    export:
      enabled: true
    propagation:
      type: w3c
    # 采样率 => 100%
    sampling:
      probability: 1
  logging:
    export:
      enabled: true
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://otel-collector:4317/v1/traces
          compression: gzip
          timeout: 10s
          transport: grpc
  metrics:
    tags:
      application: ${spring.application.name}
